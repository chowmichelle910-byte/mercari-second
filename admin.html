<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>852hk81jp — 管理後台</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+HK:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap');
:root{
  --gold:#C9A84C;--gold-light:#F5E9C8;--gold-dark:#9A7535;
  --navy:#0D1B2A;--navy-mid:#1A2E45;--navy-soft:#2A4060;
  --slate:#4A5568;--mist:#F4F6F9;--white:#FFFFFF;--border:#E2E8EF;
  --success:#059669;--warn:#D97706;--danger:#DC2626;
  --r-sm:6px;--r-md:12px;--r-lg:20px;
  --sh-sm:0 1px 4px rgba(13,27,42,.08);--sh-md:0 4px 16px rgba(13,27,42,.12);--sh-lg:0 8px 32px rgba(13,27,42,.18);
  --font:'Noto Sans HK',sans-serif;--mono:'DM Mono',monospace;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:var(--font);background:var(--mist);margin:0;padding:0;overflow-x:hidden;-webkit-font-smoothing:antialiased;}
button{font-family:var(--font);}

/* Topbar */
.topbar{background:var(--navy);position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(13,27,42,.35);}
.topbar-inner{max-width:720px;margin:0 auto;display:flex;align-items:center;padding:0 12px;}
.tb-brand{font-size:14px;font-weight:900;color:var(--gold);padding:13px 12px 13px 0;margin-right:8px;border-right:1px solid rgba(255,255,255,.1);white-space:nowrap;flex-shrink:0;}
.tb-brand span{color:rgba(255,255,255,.35);font-weight:400;}
.tb-nav{display:flex;flex:1;overflow-x:auto;scrollbar-width:none;}
.tb-nav::-webkit-scrollbar{display:none;}
.nb{display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 11px;background:none;border:none;border-bottom:2px solid transparent;color:rgba(255,255,255,.4);font-size:10px;font-weight:700;cursor:pointer;white-space:nowrap;transition:color .15s;font-family:var(--font);}
.nb .ni{font-size:16px;}
.nb:hover{color:var(--gold-light);}
.nb.active{color:var(--gold);border-bottom-color:var(--gold);}

/* Login */
#loginWrap{min-height:100vh;background:var(--navy);display:flex;align-items:center;justify-content:center;padding:20px;}
.lc{background:var(--white);border-radius:var(--r-lg);padding:36px 28px;width:100%;max-width:310px;box-shadow:var(--sh-lg);text-align:center;}
.lc .em{font-size:42px;margin-bottom:10px;}
.lc h3{margin:0 0 6px;font-size:19px;color:var(--navy);}
.lc p{margin:0 0 22px;font-size:13px;color:var(--slate);}
.pw-inp{width:100%;padding:13px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:16px;outline:none;margin-bottom:13px;text-align:center;transition:border-color .15s;}
.pw-inp:focus{border-color:var(--gold);}
.login-btn{width:100%;padding:14px;background:var(--navy);color:var(--gold);border:none;border-radius:var(--r-sm);font-size:15px;font-weight:800;cursor:pointer;}
#loginStatus{margin-top:10px;font-size:12px;color:var(--slate);}

/* Main */
#adminUI{display:none;}
.mw{max-width:720px;margin:0 auto;padding:14px 13px 100px;}
.panel{display:none;}.panel.active{display:block;}

/* Inputs */
.sel-inp{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:14px;font-family:var(--font);outline:none;background:var(--white);transition:border-color .15s;}
.sel-inp:focus{border-color:var(--gold);}
.txt-inp{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:15px;font-family:var(--font);outline:none;transition:border-color .15s;}
.txt-inp:focus{border-color:var(--gold);}

/* Cards */
.card{background:var(--white);border-radius:var(--r-md);padding:16px;margin-bottom:12px;box-shadow:var(--sh-sm);}
.card.gold-left{border-left:4px solid var(--gold);}
.card.navy-left{border-left:4px solid var(--navy);}
.card h4{margin:0 0 12px;font-size:13px;font-weight:800;color:var(--navy);}
.sec-label{font-size:10px;font-weight:700;color:var(--slate);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;display:block;}

/* Filter bar */
.filter-bar{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
.fb{padding:7px 13px;border-radius:30px;border:1.5px solid var(--border);background:var(--white);color:var(--slate);font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;font-family:var(--font);}
.fb.active{background:var(--navy);color:var(--gold);border-color:var(--navy);}

/* Arrival tabs */
.atabs{display:flex;gap:6px;overflow-x:visible;padding-bottom:4px;margin-bottom:12px;scrollbar-width:none;position:relative;flex-wrap:nowrap;}
.atabs::-webkit-scrollbar{display:none;}
.atab{padding:7px 14px;border-radius:30px;background:var(--white);color:var(--slate);border:1.5px solid var(--border);font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .15s;font-family:var(--font);}
.atab.active{background:var(--gold);color:var(--navy);border-color:var(--gold);}
.more-dropdown{position:relative;display:inline-block;}
.more-list{display:none;position:fixed;background:var(--white);border:1.5px solid var(--border);border-radius:var(--r-md);z-index:999;min-width:140px;box-shadow:var(--sh-md);overflow:hidden;}
.more-list.open{display:block;}
.more-list-item{padding:10px 14px;cursor:pointer;font-size:12px;font-weight:600;color:var(--slate);transition:background .12s;white-space:nowrap;}
.more-list-item:hover{background:var(--gold-light);color:var(--gold-dark);}

/* Ship banner */
.ship-banner{background:linear-gradient(90deg,#EFF6FF,#DBEAFE);border:1px solid #BFDBFE;border-radius:var(--r-md);padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px;}
.ship-banner-text{font-size:13px;font-weight:700;color:#1E3A8A;}

/* Pending bar */
.pbar{display:none;background:#FFF4E5;border:1px solid #FFE0B2;border-radius:var(--r-md);padding:12px 14px;margin-bottom:12px;position:sticky;top:52px;z-index:150;box-shadow:var(--sh-md);}
.pbar-top{margin-bottom:10px;padding-bottom:10px;border-bottom:1px dashed #FFE0B2;}
.pbar-top label{font-size:11px;color:#E65100;font-weight:700;display:block;margin-bottom:4px;}
.pbar-bot{display:flex;justify-content:space-between;align-items:center;}
.pcount{color:#E65100;font-weight:700;font-size:12px;}
.save-btn{background:var(--warn);color:white;border:none;padding:9px 15px;border-radius:var(--r-sm);font-weight:700;cursor:pointer;font-size:12px;}
.close-pbar{position:absolute;top:8px;right:10px;background:none;border:none;color:#94A3B8;font-size:16px;cursor:pointer;}

/* Item card */
.ic{background:var(--white);border-radius:var(--r-md);padding:12px;margin-bottom:10px;box-shadow:var(--sh-sm);border:2px solid transparent;display:flex;gap:10px;}
.ic.pending{border-color:var(--warn)!important;background:#FFFAF5!important;}
.ic-l{flex:1;display:flex;flex-direction:column;gap:4px;min-width:0;}
.ic-r{width:90px;flex-shrink:0;text-align:center;}
.code-tag{display:inline-block;background:var(--navy);color:var(--gold);font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:3px;margin-bottom:3px;}
.item-a{color:var(--navy-soft);font-weight:700;font-size:12px;border-bottom:1px solid #BFDBFE;padding-bottom:1px;}
.ard-lbl{font-size:10px;color:#94A3B8;}
.ard-val{font-weight:700;color:var(--navy);}
.plbl{font-size:10px;color:#94A3B8;font-weight:700;margin-top:2px;}
.pgrp{display:flex;gap:3px;margin:3px 0;}
.pbtn{flex:1;padding:5px 0;border:1px solid var(--border);background:var(--mist);border-radius:var(--r-sm);font-size:9px;cursor:pointer;color:var(--slate);font-weight:600;}
.pbtn.sel{background:#FEE2E2;border-color:#EF4444;color:#B91C1C;}
.id-inp{width:100%;border-radius:var(--r-sm);border:1.5px solid var(--border);font-size:16px!important;font-family:var(--font);outline:none;padding:7px 9px;margin-top:3px;}
.id-inp:focus{border-color:var(--gold);}
.locked{display:flex;align-items:center;gap:7px;background:var(--mist);padding:6px 9px;border-radius:var(--r-sm);margin-top:3px;}
.locked-p{font-size:12px;font-weight:700;color:var(--navy);}
.locked-i{font-size:10px;color:var(--slate);flex:1;font-family:var(--mono);}
.edit-lk{padding:3px 7px;font-size:10px;background:var(--white);border:1px solid var(--border);border-radius:3px;cursor:pointer;}
.wrow{display:flex;align-items:center;gap:6px;margin-top:5px;}
.w-inp{flex:1;padding:8px 9px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:16px!important;font-family:var(--font);outline:none;}
.w-inp:focus{border-color:var(--gold);}
.wu{font-weight:700;color:var(--slate);font-size:12px;}
.imgwrap{width:86px;height:86px;background:var(--mist);border-radius:var(--r-sm);overflow:hidden;margin-bottom:6px;border:1px solid var(--border);position:relative;}
.imgwrap img{width:100%;height:100%;object-fit:cover;}
.pvlbl{position:absolute;bottom:0;width:100%;background:rgba(37,99,235,.8);color:white;font-size:8px;padding:2px 0;text-align:center;}
.photo-btns{display:flex;gap:4px;justify-content:center;}
.photo-btn{padding:7px 8px;border:1px solid var(--border);background:var(--white);border-radius:var(--r-sm);cursor:pointer;font-size:14px;}
.gtag{display:inline-block;background:var(--success);color:white;padding:2px 7px;border-radius:3px;font-size:10px;font-weight:700;cursor:pointer;font-family:var(--mono);}
.atrack{font-size:10px;color:#94A3B8;cursor:pointer;}
.eval-btn{width:100%;margin-top:7px;padding:9px;background:var(--success);color:white;border:none;border-radius:var(--r-sm);font-weight:700;cursor:pointer;font-size:12px;}
.pdot{font-size:10px;color:var(--warn);margin-top:3px;}
.add-item-btn{width:100%;padding:13px;background:var(--white);border:2px dashed var(--border);border-radius:var(--r-md);color:var(--slate);font-weight:700;margin-top:12px;cursor:pointer;}
.add-item-btn:hover{border-color:var(--gold);color:var(--gold-dark);}

/* Float save */
.fsave{display:none;position:fixed;bottom:20px;right:16px;width:56px;height:56px;border-radius:50%;background:var(--warn);color:white;border:none;font-size:22px;box-shadow:0 4px 16px rgba(217,119,6,.5);cursor:pointer;z-index:300;align-items:center;justify-content:center;}

/* Modal */
.modal{display:none;position:fixed;inset:0;background:rgba(13,27,42,.7);z-index:2000;align-items:center;justify-content:center;}
.modal.open{display:flex;}
.mbox{background:var(--white);width:92%;max-width:390px;padding:20px;border-radius:var(--r-lg);display:flex;flex-direction:column;gap:9px;box-shadow:var(--sh-lg);max-height:90vh;overflow-y:auto;}
.mtitle{margin:0;font-size:16px;font-weight:800;text-align:center;color:var(--navy);}
.minp{padding:10px 11px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:15px;font-family:var(--font);outline:none;width:100%;}
.minp:focus{border-color:var(--gold);}
.mact{display:flex;gap:9px;margin-top:4px;}
.mcancel{flex:1;padding:11px;background:var(--mist);border:none;border-radius:var(--r-sm);font-weight:700;cursor:pointer;}
.mok{flex:1;padding:11px;background:var(--navy);color:var(--gold);border:none;border-radius:var(--r-sm);font-weight:700;cursor:pointer;}

/* Pick list */
.pick-region{background:var(--white);border-radius:var(--r-md);padding:13px;margin-bottom:16px;box-shadow:var(--sh-sm);border-top:5px solid var(--navy);}
.pick-region.hk{border-top-color:#1D4ED8;}.pick-region.tw{border-top-color:#7C3AED;}
.pick-title{font-size:15px;font-weight:800;color:var(--navy);margin-bottom:11px;display:flex;justify-content:space-between;align-items:center;}
.pick-wt{font-size:10px;background:#DCFCE7;color:#166534;padding:3px 9px;border-radius:30px;font-weight:700;font-family:var(--mono);}
.cust-card{display:flex;border:2px solid #EF4444;border-radius:var(--r-md);margin-bottom:12px;overflow:hidden;}
.mcode{background:#EF4444;color:white;font-size:24px;font-weight:900;width:52px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.cinfo{flex:1;padding:9px;display:flex;flex-direction:column;align-items:center;}
.cname{font-weight:700;font-size:14px;color:var(--navy);margin-bottom:7px;}
.cc{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;}
.ib{display:flex;flex-direction:column;align-items:center;gap:3px;border:1.5px solid #F59E0B;background:#FFFBEB;padding:5px;border-radius:var(--r-sm);width:74px;text-align:center;}
.ib .cn{font-weight:800;font-size:12px;color:#92400E;font-family:var(--mono);}
.ithumb{width:50px;height:50px;object-fit:cover;border-radius:3px;background:var(--mist);}
.inlbl{font-size:9px;color:var(--slate);width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* Tool group tabs */
#toolGrpTabs .atab{font-size:12px;}
/* ── Tools (出單工具) ── */
.tool-subtabs{display:flex;gap:0;background:var(--mist);border-radius:var(--r-md);padding:4px;margin-bottom:16px;}
.tool-subtab{flex:1;padding:9px 6px;border:none;background:none;border-radius:var(--r-sm);font-weight:700;font-size:12px;cursor:pointer;color:var(--slate);transition:all .15s;font-family:var(--font);white-space:nowrap;}
.tool-subtab.active{background:var(--white);color:var(--navy);box-shadow:var(--sh-sm);}
.tool-subpanel{display:none;}.tool-subpanel.active{display:block;}
.tool-grp-sel{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:14px;font-family:var(--font);outline:none;background:var(--white);margin-bottom:14px;}
.tool-grp-sel:focus{border-color:var(--gold);}
.tool-btn{width:100%;padding:12px;border:none;border-radius:var(--r-sm);font-weight:800;font-size:13px;cursor:pointer;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:7px;transition:opacity .15s;}
.tool-btn:hover{opacity:.88;}
.tb-navy{background:var(--navy);color:var(--gold);}
.tb-green{background:var(--success);color:white;}
.tb-orange{background:var(--warn);color:white;}
.tb-purple{background:#7C3AED;color:white;}
/* Preview area for tool output */
.tool-preview{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r-md);padding:14px;margin-top:12px;font-size:13px;line-height:1.7;color:var(--slate);display:none;max-height:420px;overflow-y:auto;}
.tool-preview.active{display:block;}
.tool-preview-html{font-size:13px;}
.tool-preview-actions{display:flex;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
.preview-copy-btn{flex:1;padding:9px;background:var(--navy);color:var(--gold);border:none;border-radius:var(--r-sm);font-weight:700;font-size:12px;cursor:pointer;}
.preview-send-btn{flex:1;padding:9px;background:var(--success);color:white;border:none;border-radius:var(--r-sm);font-weight:700;font-size:12px;cursor:pointer;}
.tstatus{margin-top:8px;padding:9px 12px;border-radius:var(--r-sm);font-size:12px;font-weight:600;display:none;}
.ts-ok{background:#DCFCE7;color:#166534;display:block;}
.ts-err{background:#FEE2E2;color:#991B1B;display:block;}
.ts-ld{background:#EFF6FF;color:#1E40AF;display:block;}

/* ── Finance ── */
.bal-card{background:linear-gradient(135deg,var(--navy),var(--navy-soft));border-radius:var(--r-md);padding:18px;margin-bottom:13px;color:white;position:relative;overflow:hidden;}
.bal-card::before{content:'¥';position:absolute;right:-10px;top:-18px;font-size:100px;font-weight:900;opacity:.06;color:var(--gold);}
.bal-lbl{font-size:10px;color:rgba(255,255,255,.5);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;}
.bal-amt{font-size:32px;font-weight:900;color:var(--gold);font-family:var(--mono);}
.bal-sub{font-size:11px;color:rgba(255,255,255,.35);margin-top:4px;}
/* Charge input form */
.charge-form{background:var(--white);border-radius:var(--r-md);padding:16px;margin-bottom:13px;box-shadow:var(--sh-sm);border-left:4px solid var(--gold);}
.charge-form h4{margin:0 0 12px;font-size:13px;font-weight:800;color:var(--navy);}
.charge-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.charge-field label{font-size:10px;font-weight:700;color:var(--slate);text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:4px;}
.charge-field input,.charge-field select{width:100%;padding:9px 10px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:14px;font-family:var(--font);outline:none;background:var(--white);transition:border-color .15s;}
.charge-field input:focus,.charge-field select:focus{border-color:var(--gold);}
.charge-rate-display{background:var(--mist);padding:9px 10px;border-radius:var(--r-sm);font-family:var(--mono);font-size:14px;color:var(--gold-dark);font-weight:700;}
.charge-submit{width:100%;padding:12px;background:var(--navy);color:var(--gold);border:none;border-radius:var(--r-sm);font-weight:800;cursor:pointer;font-size:13px;margin-top:4px;}
/* Finance tables */
.fin-section{background:var(--white);border-radius:var(--r-md);box-shadow:var(--sh-sm);overflow:hidden;margin-bottom:13px;}
.fin-section-head{background:var(--mist);padding:11px 14px;font-size:12px;font-weight:800;color:var(--navy);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.fin-section-head span{font-size:11px;color:var(--slate);font-weight:400;font-family:var(--mono);}
.ft{width:100%;border-collapse:collapse;font-size:11px;}
.ft th{background:var(--mist);padding:6px 8px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--slate);border-bottom:1px solid var(--border);white-space:nowrap;}
.ft td{padding:7px 8px;border-bottom:1px solid var(--border);font-family:var(--mono);}
.ft tr:last-child td{border-bottom:none;}
.ft tr:hover td{background:#FAFBFC;}
.ft .cn2{font-family:var(--font);font-weight:700;color:var(--navy);font-size:12px;}
.ft .rt{color:var(--gold-dark);font-weight:700;}
.ft .pf{color:var(--success);font-weight:700;}
/* Profit table */
.profit-table-wrap{overflow-x:auto;}
.profit-m-inp{width:80px;padding:4px 6px;border:1.5px solid var(--border);border-radius:4px;font-size:12px;font-family:var(--mono);outline:none;text-align:right;}
.profit-m-inp:focus{border-color:var(--gold);}
.clear-color-btn{padding:3px 8px;background:none;border:1px solid var(--border);border-radius:4px;font-size:10px;cursor:pointer;color:var(--slate);white-space:nowrap;}
.clear-color-btn:hover{background:var(--mist);}

/* Profit group KPI cards */
.kpi-box{background:var(--white);border-radius:var(--r-md);padding:12px;box-shadow:var(--sh-sm);border-left:3px solid var(--gold);}
.kpi-box.green{border-left-color:var(--success);}
.kpi-lbl{font-size:10px;color:var(--slate);font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px;}
.kpi-val{font-size:18px;font-weight:900;color:var(--navy);font-family:var(--mono);}
.kpi-val.g{color:var(--success);}

/* ID Search */
.srow{display:flex;gap:7px;flex-wrap:wrap;}
.sinp{flex:1;min-width:140px;padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:15px;font-family:var(--font);outline:none;}
.sinp:focus{border-color:var(--gold);}
.sbtn{padding:10px 20px;background:var(--navy);color:var(--gold);border:none;border-radius:var(--r-sm);font-weight:800;font-size:13px;cursor:pointer;}
.slbl{font-size:10px;font-weight:700;color:var(--slate);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;display:block;}
.rval{font-size:16px;font-weight:900;color:var(--navy);margin-bottom:13px;}
.urow{display:flex;gap:7px;margin-bottom:13px;}
.uinp{flex:1;padding:8px 11px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:11px;font-family:var(--mono);background:var(--mist);outline:none;}
.uopen{padding:8px 12px;border:1.5px solid var(--border);border-radius:var(--r-sm);background:var(--white);cursor:pointer;font-size:12px;white-space:nowrap;}
.divlbl{font-size:10px;font-weight:700;color:var(--slate);text-transform:uppercase;letter-spacing:.05em;padding-top:11px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.copybtn{background:var(--navy);color:var(--gold);border:none;padding:6px 14px;border-radius:var(--r-sm);font-weight:700;font-size:11px;cursor:pointer;}
.stline{font-size:12px;color:var(--slate);margin-top:6px;min-height:15px;}

/* Record customer cards */
.rec-card{background:var(--white);border-radius:var(--r-md);padding:14px;margin-bottom:12px;box-shadow:var(--sh-sm);border:1.5px solid var(--border);position:relative;}
.rec-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.rec-username{font-size:14px;font-weight:800;color:var(--navy);font-family:var(--mono);}
.rec-copy-btn{padding:6px 12px;background:var(--navy);color:var(--gold);border:none;border-radius:var(--r-sm);font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.rec-copy-btn:active{opacity:.7;}
.rec-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px;}
.rec-field{background:var(--mist);border-radius:var(--r-sm);padding:7px 9px;}
.rec-field label{font-size:9px;font-weight:700;color:var(--slate);text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:2px;}
.rec-field .rv{font-size:12px;font-weight:600;color:var(--navy);font-family:var(--mono);}
.rec-field.full{grid-column:1/-1;}
.rec-track-row{display:flex;gap:7px;align-items:center;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);}
.rec-track-inp{flex:1;padding:8px 10px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:14px;font-family:var(--mono);outline:none;}
.rec-track-inp:focus{border-color:var(--gold);}
.rec-save-btn{padding:8px 14px;background:var(--success);color:white;border:none;border-radius:var(--r-sm);font-weight:700;font-size:12px;cursor:pointer;white-space:nowrap;}

/* Status / empty / spin */
.empty{text-align:center;padding:36px 20px;color:var(--slate);font-size:13px;}
.spin{width:26px;height:26px;border:3px solid rgba(201,168,76,.25);border-top-color:var(--gold);border-radius:50%;animation:sp .8s linear infinite;margin:0 auto 9px;}
@keyframes sp{to{transform:rotate(360deg);}}
</style>

<script>
// ── Config ──
const API      = 'https://script.google.com/macros/s/AKfycby2I6Q2M67npEFW-Vqi14JS3L7rtuQ9DLD35KwhwCaGpyt3xBnRfNyeLcOGXfslA9sx/exec';

const SB_URL   = 'https://ifrjaxpgrnvjesboelra.supabase.co';
const SB_KEY   = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlmcmpheHBncm52amVzYm9lbHJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0MDU2OTAsImV4cCI6MjA5Nzk4MTY5MH0.3Qw4z9JGapt_B90v_ulja7pM2bSDhbhp439auyvwi_M';

// ── Supabase upsert（以 sheet_row 作唯一識別）──
async function sbUpsert(record) {
  const res = await fetch(`${SB_URL}/rest/v1/arrivals`, {
    method : 'POST',
    headers: {
      'apikey'        : SB_KEY,
      'Authorization' : 'Bearer ' + SB_KEY,
      'Content-Type'  : 'application/json',
      'Prefer'        : 'resolution=merge-duplicates'
    },
    body: JSON.stringify(record)
  });
  if (!res.ok) throw new Error('Supabase ' + res.status);
}

// ── 背景 fire GAS 寫回 Sheet（唔等回應，唔阻塞用戶）──
function fireGAS(params) {
  fetch(API, {
    method : 'POST',
    mode   : 'no-cors',
    body   : new URLSearchParams(params)
  }).catch(() => {});
}

let pw='', allItems=[], allGroups=[], curFilter='todo', curArr='未到貨';
let pending=new Map(), editRows=new Set(), pickLoaded=false;
let imgCache=new Map();
try{const c=localStorage.getItem('img_cache');if(c)imgCache=new Map(JSON.parse(c));}catch(e){}

// ── Boot ──
window.onload=()=>{
  const s=localStorage.getItem('adminPassword');
  if(s){pw=s;callAdmin();}
  document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

function doLogin(){
  pw=document.getElementById('pw').value.trim();if(!pw)return;
  document.getElementById('loginStatus').textContent='驗證中…';
  callAdmin().catch(()=>{document.getElementById('loginStatus').textContent='密碼錯誤或連線失敗';localStorage.removeItem('adminPassword');pw='';});
}

async function callAdmin(){
  const d=await post({action:'getAdminItems',password:pw});
  if(d.error)throw new Error(d.error);
  localStorage.setItem('adminPassword',pw);
  processItems(d);
  document.getElementById('loginWrap').style.display='none';
  document.getElementById('adminUI').style.display='block';
}

function processItems(d){
  allItems=d.items||[];

  // Ship date from Currency sheet (via MAIN_API)
  loadShipDate();

  allGroups=[...new Set(allItems.map(i=>i.arrival).filter(a=>a&&String(a).trim()))].sort((a,b)=>gn(b)-gn(a));
  const grpOpts='<option value="">— 選擇團次 —</option>'+allGroups.map(g=>`<option value="${esc(g)}">${esc(g)}</option>`).join('');
  // Build tool group tabs (same style as arrival tabs)
  buildToolGrpTabs(allGroups);

  const shops=[...new Set(allItems.map(i=>(i.shop||'').trim()))].filter(Boolean).sort();
  document.getElementById('addShop').innerHTML='<option value="">選擇商店…</option>'+(shops.length?shops:['Mercari','Amazon','Rakuten']).map(s=>`<option value="${esc(s)}">${esc(s)}</option>`).join('');
  const pos=[...new Set(allItems.map(i=>(i.position||'').trim()))].filter(Boolean).sort();
  document.getElementById('addPos').innerHTML='<option value="">選擇來源…</option>'+(pos.length?pos:Object.values(POS_MAP)).map(p=>`<option value="${esc(p)}">${esc(p)}</option>`).join('');

  post({action:'getCustomerIds',password:pw}).then(r=>{document.getElementById('idList').innerHTML=(r.ids||[]).map(id=>`<option value="${esc(id)}">`).join('');});

  setFilter('todo');buildArrTabs();
}

// ── Ship Date from Currency C col ──
async function loadShipDate(){
  try{
    const d=await postMain({action:'getNextShipDate',password:pw});
    if(d&&d.text) document.getElementById('shipText').textContent=d.text;
    else document.getElementById('shipText').textContent='未有寄出資料';
  }catch(e){ document.getElementById('shipText').textContent='未有寄出資料'; }
}

// ── Nav ──
function switchNav(n){
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('nb-'+n).classList.add('active');
  document.getElementById('panel-'+n).classList.add('active');
  if(n==='pick'&&!pickLoaded)loadPick();
  if(n==='finance')loadFinanceAll();
  if(n==='idsearch')loadIdList();
}

// ── Tool sub-tabs ──
// ── Tool group tabs ──
let curToolGrp = '';

function buildToolGrpTabs(groups){
  const tabs = document.getElementById('toolGrpTabs');
  if(!tabs) return;
  tabs.innerHTML = '';
  const show = groups.slice(0,3);
  const more = groups.slice(3);

  show.forEach(n=>{
    const b=document.createElement('div');
    b.className='atab'+(n===curToolGrp?' active':'');
    b.textContent=n;
    b.onclick=()=>selectToolGrp(n);
    tabs.appendChild(b);
  });

  if(more.length){
    const wrap=document.createElement('div');wrap.className='more-dropdown';
    const btn=document.createElement('div');
    btn.className='atab'+(more.includes(curToolGrp)?' active':'');
    btn.textContent='更多…';
    const list=document.createElement('div');list.className='more-list';
    more.forEach(n=>{
      const item=document.createElement('div');
      item.className='more-list-item'+(n===curToolGrp?' active':'');
      item.textContent=n;
      item.onclick=(e)=>{e.stopPropagation();selectToolGrp(n);list.classList.remove('open');buildToolGrpTabs(allGroups);};
      list.appendChild(item);
    });
    btn.onclick=(e)=>{
      e.stopPropagation();
      const isOpen=list.classList.contains('open');
      document.querySelectorAll('.more-list.open').forEach(l=>l.classList.remove('open'));
      if(!isOpen){const rect=btn.getBoundingClientRect();list.style.top=(rect.bottom+6)+'px';list.style.left=rect.left+'px';list.classList.add('open');}
    };
    document.addEventListener('click',()=>list.classList.remove('open'));
    wrap.appendChild(btn);wrap.appendChild(list);tabs.appendChild(wrap);
  }

  // Auto-select first group if none selected
  if(!curToolGrp && groups.length) selectToolGrp(groups[0]);
}

function selectToolGrp(g){
  curToolGrp = g;
  // Update active tab
  document.querySelectorAll('#toolGrpTabs .atab').forEach(b=>{
    b.classList.toggle('active', b.textContent===g);
  });
  // Reload arrival cards if on arrival tab
  const activeTab=document.querySelector('.tool-subtab.active');
  if(activeTab&&activeTab.id==='ts-arrival') loadRecordCards(g);
}

// ── 新團設定 ──
async function loadNewGroupDefaults(){

    document.getElementById('ng-r10k').value=d.r10k||'';
    document.getElementById('ng-r50k').value=d.r50k||'';
  }catch(e){}
}

async function saveNewGroup(){

  const end=document.getElementById('ng-end').value;

async function fetchPrev(url,row){
  if(imgCache.has(url)){upIW(row,imgCache.get(url));return;}
  // Mercari 一般商品：用 static CDN 直接取圖
  const m=url.match(/item\/(m\d+)/);
  if(m){const img=`https://static.mercdn.net/item/detail/orig/photos/${m[1]}_1.jpg`;svCache(url,img);upIW(row,img);return;}
  // Mercari Shops 訂單連結：無商品圖可取，顯示無預覽
  if(url.includes('mercari-shops.com')){const l=document.getElementById(`il-${row}`);if(l)l.textContent='無預覽';return;}
  // 其他連結：用 linkpreview
  setTimeout(async()=>{try{const r=await fetch(`https://api.linkpreview.net/?key=${LPK}&q=${encodeURIComponent(url)}`);const d=await r.json();if(d&&d.image){svCache(url,d.image);upIW(row,d.image);}else throw 0;}catch{const l=document.getElementById(`il-${row}`);if(l)l.textContent='無預覽';}},Math.random()*2000);
}
function svCache(u,i){try{imgCache.set(u,i);const a=Array.from(imgCache.entries());localStorage.setItem('img_cache',JSON.stringify(a.length>400?a.slice(-400):a));}catch{localStorage.removeItem('img_cache');imgCache.clear();}}

async function saveBatch(){
  if(!pending.size)return;if(!confirm('確定儲存全部修改？'))return;
  const sb=document.querySelector('.save-btn'),fb=document.getElementById('floatSave');
  if(sb){sb.disabled=true;sb.textContent='儲存中…';}if(fb)fb.disabled=true;
  const dv=document.getElementById('arrDateInp').value.replace(/-/g,'/');

  // 分兩類：有圖片或重量（磅重類）→ Supabase 優先；其他（position/custId/track）→ 直接 GAS
  const sbTasks=[], gasTasks=[];

  Array.from(pending.entries()).forEach(([row,data])=>{
    const hw=data.weight!==undefined&&String(data.weight).trim()!=='';
    const hasImg=data.image!==undefined&&data.image!=='';
    const isArrival=hw||hasImg;  // 到貨磅重類

    const gasParams={action:'saveArrivalData',password:pw,row};
    if(data.position!==undefined)gasParams.position=data.position;
    if(data.custId!==undefined)gasParams.custId=data.custId;
    if(data.weight!==undefined)gasParams.weight=data.weight;
    if(data.image!==undefined)gasParams.image=data.image;
    if(data.track!==undefined)gasParams.track=data.track;
    if(hw){gasParams.arrivalDate=dv;gasParams.shipDate=dv;gasParams.status='未評價';}

    if(isArrival){
      // 1. 先寫 Supabase（快，用戶等呢個）
      const sbRecord={sheet_row:row};
      if(hasImg)sbRecord.image_url=data.image;
      if(hw){sbRecord.weight_kg=parseFloat(data.weight);sbRecord.arrival_date=dv;sbRecord.status='未評價';}
      if(data.position!==undefined)sbRecord.position=data.position;
      if(data.custId!==undefined)sbRecord.cust_id=data.custId;
      if(data.track!==undefined)sbRecord.track=data.track;
      sbRecord.updated_at=new Date().toISOString();
      sbTasks.push(sbUpsert(sbRecord));

      // 2. 背景 fire GAS（唔等，慢慢寫回 Sheet）
      fireGAS(gasParams);
    } else {
      // 非到貨類（改 position/custId/track）→ 直接 GAS，等回應
      gasTasks.push(post(gasParams));
    }
  });

  try{
    // 等 Supabase（快）+ 等非到貨 GAS tasks
    await Promise.all([...sbTasks,...gasTasks]);

    // 重新載入商品列表（GAS 可能仲未寫完，但 UI 可以即時更新本地 allItems）
    pending.forEach((data,row)=>{
      const it=allItems.find(i=>i.row===row);
      if(!it)return;
      if(data.image!==undefined)it.image=data.image;
      if(data.weight!==undefined)it.weight=parseFloat(data.weight)||0;
      if(data.position!==undefined)it.position=data.position;
      if(data.custId!==undefined)it.custId=data.custId;
      if(data.track!==undefined)it.track=data.track;
      const hw=data.weight!==undefined&&String(data.weight).trim()!=='';
      if(hw){it.arrivalDate=dv;it.status='未評價';}
    });
    pending.clear();editRows.clear();render();updUI();
    alert('儲存成功！');
  }
  catch(err){alert('儲存失敗：'+err.message);}
  finally{if(sb){sb.disabled=false;sb.textContent='💾 儲存全部';}if(fb)fb.disabled=false;}
}

  const tabs=document.getElementById('pickGrpTabs');

    const b=document.createElement('div');

    b.onclick=()=>swPick(n);

  });

    const wrap=document.createElement('div');

    btn.textContent='更多…';

    list.className='more-list';

      item.onclick=(e)=>{e.stopPropagation();swPick(n);list.classList.remove('open');buildPickTabs(sorted,n);};

// 取最細 code 作為整體編號
function getMinCode(items){
  if(!items||!items.length)return'-';
  const valid=items.filter(i=>i.code&&!isNaN(Number(i.code)));
  if(!valid.length)return items[0]?.code||'-';
  return valid.reduce((min,i)=>Number(i.code)<Number(min.code)?i:min).code;
}

function renderPickGrp(n){
  const c=document.getElementById('pickContent'),g=pickData[n];c.innerHTML='';
  ['HK','TW'].forEach(rk=>{
    const info=g[rk];if(!Object.keys(info.customers).length)return;
    const lbl=rk==='HK'?'🇭🇰 香港團':'🇹🇼 台灣團';
    const wt=(info.totalWeightKg||info.totalWeight||0);
    let h=`<div class="pick-region ${rk.toLowerCase()}"><div class="pick-title">${lbl}<span class="pick-wt">總重 ${wt.toFixed(3)} kg</span></div>`;
    Object.keys(info.customers).sort().forEach(cid=>{
      const items=info.customers[cid].sort((a,b)=>Number(a.code)-Number(b.code));
      const mc=getMinCode(items);
      h+=`<div class="cust-card"><div class="mcode">${mc}</div><div class="cinfo"><div class="cname">${cid}</div><div class="cc">${items.map(it=>`<div class="ib">${it.img?`<img src="${it.img}" class="ithumb" loading="lazy">`:`<div class="ithumb" style="display:flex;align-items:center;justify-content:center;font-size:9px;color:#ccc;">無圖</div>`}<div class="cn">#${it.code}</div><div class="inlbl">${it.link?`<a href="${it.link}" target="_blank" style="color:inherit;text-decoration:none;">${esc(it.itemName||'商品')}</a>`:esc(it.itemName||'商品')}</div></div>`).join('')}</div></div></div>`;
    });
    h+='</div>';c.innerHTML+=h;
  });
}

async function loadRecordCards(group){
  const el=document.getElementById('recordCardList');
  if(!el)return;
  currentRecordGroup=group;
  el.innerHTML='<div class="empty"><div class="spin"></div>載入客人資料…</div>';
  try{
    const d=await postMain({action:'getRecordData',password:pw,group});
    if(d.error){el.innerHTML='<div class="empty">❌ '+d.error+'</div>';return;}
    const rows=d.rows||[];
    if(!rows.length){el.innerHTML='<div class="empty">Record 暫無此團資料，請先匯出</div>';return;}
    el.innerHTML=rows.map(r=>renderRecordCard(r,group)).join('');

}

function buildMsg(r, arrTag, receiptUrl){
  const method  = r.method || '';

  const trk     = r.tracking || '（未提供）';

  const urlLine = receiptUrl ? ('\n到貨資料: ' + receiptUrl + '\n\n') : '\n到貨資料: \n\n';

    let local = 10;

      local = 13;

      local = 13;
    }
    const total = (parseFloat(postage) + local).toFixed(1);
    return `客人你好, ${arrTag}嘅貨品已運往香港途中~
    ${urlLine}
    請客人核對表格中嘅收件資料, 並可以隨時支付國際運費HK$${postage}
及易寄取郵費HK$${local}, 共HK$${total}🙏🏻

如果收件資料冇更改，我哋會用以下運單編號寄出：
${trk}

謝謝!`;
  }
  else if(method.toUpperCase().includes('SF')){
    return `客人你好, ${arrTag}嘅貨品已運往香港途中~
    ${urlLine}
    請客人核對表格中嘅收件資料, 並可以隨時支付國際運費HK$${postage}
香港運費部分會由順豐收取

如果收件資料冇更改，我哋會用以下運單編號寄出：
${trk}

謝謝!`;
  }
  else if(method.includes('平郵')){
    return `客人你好, ${arrTag}嘅貨品已運往香港途中~
    ${urlLine}
    請客人核對表格中嘅收件資料, 並可以隨時支付國際運費HK$${postage}
🙏🏻
香港平郵郵費部分會於寄出後提供寄出證明時收取

謝謝!`;
  }
  else{
    return `客人你好, ${arrTag}嘅貨品已運往香港途中~
    ${urlLine}
    請客人核對表格中嘅收件資料, 並可以隨時支付國際運費HK$${postage}

謝謝!`;
  }
}

function copyMsg(rowNum){
  const trkEl = document.getElementById('trk-'+rowNum);
  const msgEl = document.getElementById('msg-'+rowNum);
  const card  = document.getElementById('rcard-'+rowNum);
  if(!msgEl)return;

  const trk = trkEl ? trkEl.value.trim() : '';
  let msg = msgEl.value;
  if(trk){
    msg = msg.replace('（未提供）', trk);
  }
  // 如果有收據 URL，確保已加入（若生成後才點複製）
  const urlRow = card?.querySelector('.receipt-url-row a');
  if(urlRow && !msg.includes(urlRow.href)){
    const url = urlRow.href;
    msg = msg.replace('到貨資料: \n', `到貨資料: ${url}\n`)
             .replace('途中~\n請', `途中~\n到貨資料: ${url}\n請`);
  }

  navigator.clipboard.writeText(msg).then(()=>{
    const btn=card.querySelector('.rec-copy-btn');
    const orig=btn.textContent; btn.textContent='✅ 已複製！';
    setTimeout(()=>btn.textContent=orig, 2000);
  }).catch(()=>{
    const ta=document.createElement('textarea');ta.value=msg;
    document.body.appendChild(ta);ta.select();document.execCommand('copy');
    document.body.removeChild(ta);
    const btn=card.querySelector('.rec-copy-btn');
    const orig=btn.textContent; btn.textContent='✅ 已複製！';
    setTimeout(()=>btn.textContent=orig, 2000);
  });
}

async function saveTracking(rowNum){
  const inp=document.getElementById('trk-'+rowNum);
  if(!inp)return;
  const btn=inp.nextElementSibling;
  btn.disabled=true; btn.textContent='儲存中…';
  try{
    const d=await postMain({action:'saveTrackingNo',password:pw,recordRow:rowNum,tracking:inp.value.trim()});
    if(d.error)throw new Error(d.error);
    btn.textContent='✅ 已儲存';
    setTimeout(()=>{btn.disabled=false;btn.textContent='💾 儲存';},2000);
  }catch(e){
    alert('儲存失敗：'+e.message);
    btn.disabled=false; btn.textContent='💾 儲存';
  }
}

// ════════ RECEIPT IMAGE → Supabase Storage ════════

async function showReceipt(userName, group){
  if(!userName||!group){alert('請先選擇團次並載入客人資料');return;}

  // 搵按鈕並顯示 loading
  const btn = [...document.querySelectorAll('.rec-copy-btn')].find(b=>
    b.textContent.includes('到貨圖') &&
    b.closest('.rec-card')?.querySelector('.rec-username')?.textContent?.trim()===userName
  );
  const origText = btn?.textContent||'🖼️ 到貨圖';
  if(btn){btn.disabled=true;btn.textContent='⏳ 生成中…';}

  try{
    // 1. 取資料
    const d = await postMain({action:'getCustomerReceipt',password:pw,group,userName});
    if(d.error) throw new Error(d.error);

    // 2. 取 Record 卡片資料
    let recData = null;
    document.querySelectorAll('.rec-card').forEach(card=>{
      const uname=card.querySelector('.rec-username');
      if(uname&&uname.textContent.trim()===userName){
        const fields=card.querySelectorAll('.rv');
        recData={
          method   : fields[0]?.textContent||'',
          postage  : fields[1]?.textContent||'',
          weight   : fields[2]?.textContent||'',
          receiver : fields[6]?.textContent||'',
          phoneAddr: fields[7]?.textContent||''
        };
      }
    });
    const phone   = recData?.phoneAddr?.split('|')[0]?.trim()||'';
    const address = recData?.phoneAddr?.split('|').slice(1).join('|').trim()||'';

    // 3. 生成 HTML
    const html = buildReceiptHtml(d.items||[], userName, group, recData, phone, address);

    // 4. 上傳到 Supabase Storage
    // Supabase key 只接受 ASCII，移除中文同特殊字符
  const safeUser  = userName.replace(/[^a-zA-Z0-9_\-]/g, '_');
  const safeGroup = group.replace(/[^a-zA-Z0-9_\-]/g, '_');
  const filename  = `receipt_${safeUser}_${safeGroup}_${Date.now()}.html`;
    // 用 x-upsert:true 自動處理新增/更新，確保 UTF-8 encoding
    const htmlBytes = new TextEncoder().encode(html);
    const uploadRes = await fetch(`${SB_URL}/storage/v1/object/receipts/${filename}`, {
      method : 'POST',
      headers: {
        'apikey'        : SB_KEY,
        'Authorization' : 'Bearer ' + SB_KEY,
        'Content-Type'  : 'text/html; charset=utf-8',
        'x-upsert'      : 'true',
        'Content-Length': String(htmlBytes.length),
      },
      body: new Blob([htmlBytes], {type:'text/html; charset=utf-8'})
    });

    if(!uploadRes.ok){
      const errText = await uploadRes.text();
      throw new Error('上傳失敗：'+uploadRes.status+' — '+errText);
    }

    // 5. 公開 URL
    const publicUrl = `${SB_URL}/storage/v1/object/public/receipts/${filename}`;

    // 6. 顯示 URL + 複製
    const VIEWER_BASE = 'https://852hk-81jp-mercari.vercel.app/viewer.html'; // 改成你實際網域
const viewerUrl = `${VIEWER_BASE}?src=${encodeURIComponent(publicUrl)}`;
showReceiptUrl(userName, viewerUrl);

  }catch(e){
    alert('生成失敗：'+e.message);
  }finally{
    if(btn){btn.disabled=false;btn.textContent=origText;}
  }
}

function showReceiptUrl(userName, url){
  document.querySelectorAll('.rec-card').forEach(card=>{
    const uname=card.querySelector('.rec-username');
    if(uname&&uname.textContent.trim()===userName){
      // 移除舊的 url row（如有）
      const oldRow=card.querySelector('.receipt-url-row');
      if(oldRow)oldRow.remove();

      const row=document.createElement('div');
      row.className='receipt-url-row';
      row.style.cssText='display:flex;gap:7px;align-items:center;margin-top:8px;padding:8px 10px;background:#EFF6FF;border-radius:6px;';
      const span = document.createElement('span');
      span.style.cssText = 'font-size:11px;color:#1E40AF;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;';
      const a = document.createElement('a');
      a.href = url; a.target = '_blank'; a.style.color = '#1E40AF'; a.textContent = '🔗 ' + url;
      span.appendChild(a);
      const cpBtn = document.createElement('button');
      cpBtn.textContent = '複製連結';
      cpBtn.style.cssText = 'padding:5px 11px;background:#1E40AF;color:white;border:none;border-radius:5px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;';
      cpBtn.onclick = () => copyReceiptUrl(url, cpBtn);
      row.appendChild(span); row.appendChild(cpBtn);
      const trackRow=card.querySelector('.rec-track-row');
      card.insertBefore(row, trackRow);

      // 更新 hidden msg textarea 加入 URL
      const msgEl=card.querySelector('textarea[id^="msg-"]');
      if(msgEl){
        let msg=msgEl.value;
        if(!msg.includes(url)){
          // 如果訊息有到貨資料行就補入URL，否則插入到第一行後
          if(msg.includes('到貨資料: \n')){
            msg=msg.replace('到貨資料: \n',`到貨資料: ${url}\n`);
          } else {
            msg=msg.replace('途中~\n','途中~\n到貨資料: '+url+'\n');
          }
          msgEl.value=msg;
        }
      }
    }
  });
}

function copyReceiptUrl(url, btn){
  navigator.clipboard.writeText(url).then(()=>{
    const orig=btn.textContent; btn.textContent='✅ 已複製';
    setTimeout(()=>btn.textContent=orig,2000);
  });
}

    const d = await postMain({action:'getCustomerGroupSummary', password:pw, group});
    if(d.error){ document.getElementById('buyerTbody').innerHTML=`<tr><td colspan="4" class="empty">❌ ${esc(d.error)}</td></tr>`; return; }
    const rows = Array.isArray(d.rows) ? d.rows : [];
    if(!rows.length){ document.getElementById('buyerTbody').innerHTML='<tr><td colspan="4" class="empty">此團暫無訂單</td></tr>'; return; }
    let totalJpy = 0;
    const html = rows.map(r=>{
      const jpy = r.totalJpy || 0;
      const rate = r.rate || 0;
      const hkd = rate > 0 ? (jpy * rate).toFixed(1) : '—';
      totalJpy += jpy;
      return `<tr>
        <td class="cn2">${esc(r.name||'')}</td>
        <td>¥${Number(jpy).toLocaleString()}</td>
        <td class="rt">${rate||'—'}</td>
        <td>${rate>0?'HK$'+hkd:'—'}</td>
      </tr>`;
    }).join('');
    const totalRow = `<tr style="background:var(--mist);font-weight:700;">
      <td class="cn2">合計 ${rows.length} 人</td>
      <td>¥${Number(totalJpy).toLocaleString()}</td>
      <td>—</td><td>—</td>
    </tr>`;
    document.getElementById('buyerTbody').innerHTML = html + totalRow;
  }catch(e){ document.getElementById('buyerTbody').innerHTML=`<tr><td colspan="4" class="empty">❌ 載入失敗</td></tr>`; }
}

let profitAllRows=[], curProfitGroup='';

async function loadProfitTable(){
  try{
    const d=await postMain({action:'getAnalysisData',password:pw});
    if(d.error)return;
    profitAllRows=Array.isArray(d.rows)?d.rows:[];
    if(!profitAllRows.length){
      document.getElementById('profitGroupTabs').innerHTML='';
      document.getElementById('profitContent').innerHTML='<div class="empty">暫無數據</div>';
      return;
    }
    // Build tabs — newest first (rows already sorted from GAS)
    const groups=profitAllRows.map(r=>r.group).reverse();
    curProfitGroup=groups[0];
    buildProfitTabs(groups);
    renderProfitGroup(curProfitGroup);
  }catch(e){
    document.getElementById('profitContent').innerHTML='<div class="empty">❌ 載入失敗</div>';
  }
}

function buildProfitTabs(groups){
  const tabs=document.getElementById('profitGroupTabs');
  tabs.innerHTML=groups.map(g=>
    `<div class="atab${g===curProfitGroup?' active':''}" onclick="switchProfitGroup('${esc(g)}')">${esc(g)}</div>`
  ).join('');
}

function switchProfitGroup(g){
  curProfitGroup=g;
  document.querySelectorAll('#profitGroupTabs .atab').forEach(b=>b.classList.toggle('active',b.textContent===g));
  renderProfitGroup(g);
}

function renderProfitGroup(g){
  const r=profitAllRows.find(row=>row.group===g);
  const el=document.getElementById('profitContent');
  if(!r){el.innerHTML='<div class="empty">找不到此團數據</div>';return;}

  el.innerHTML=`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;">
      <div class="kpi-box"><div class="kpi-lbl">貨品數量</div><div class="kpi-val">${r.qty!=null?r.qty:'—'}</div></div>
      <div class="kpi-box"><div class="kpi-lbl">購入日幣</div><div class="kpi-val" style="font-size:15px;">${r.buyJpy!=null?'¥'+Number(r.buyJpy).toLocaleString():'—'}</div></div>
      <div class="kpi-box"><div class="kpi-lbl">收到港幣</div><div class="kpi-val" style="font-size:15px;">${r.rcvHkd!=null?'HK$'+Number(r.rcvHkd).toFixed(1):'—'}</div></div>
      <div class="kpi-box green"><div class="kpi-lbl">賺取港幣</div><div class="kpi-val g">${r.earnHkd!=null?'HK$'+Number(r.earnHkd).toFixed(1):'—'}</div></div>
      <div class="kpi-box" style="border-left-color:${r.settled?'var(--success)':'#7C3AED'};">
        <div class="kpi-lbl">每人賺取</div>
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
          <div class="kpi-val" style="font-size:15px;color:${r.settled?'var(--success)':'#7C3AED'};">${r.perPerson!=null?r.perPerson:'—'}</div>
          <span style="font-size:11px;font-weight:700;padding:2px 8px;border-radius:30px;background:${r.settled?'#DCFCE7':'#F3F0FF'};color:${r.settled?'var(--success)':'#7C3AED'};">
            ${r.settled?'✅ 已結算':'⏳ 未結算'}
          </span>
        </div>
        ${r.perPerson!=null?`<button class="clear-color-btn" style="margin-top:4px;" onclick="clearIColor('${esc(g)}','${esc(String(r.analysisRow))}')">
          ${r.settled?'🔄 取消結算':'🎨 標記結算'}
        </button>`:''}
      </div>
      <div class="kpi-box"><div class="kpi-lbl">寄出重量</div><div class="kpi-val" style="font-size:15px;">${r.weight!=null?r.weight:'—'}</div></div>
      <div class="kpi-box"><div class="kpi-lbl">客人郵費</div><div class="kpi-val" style="font-size:15px;">${r.custPostage!=null?'HK$'+Number(r.custPostage).toFixed(1):'—'}</div></div>
      <div class="kpi-box" style="border-left-color:var(--warn);">
        <div class="kpi-lbl">實際郵費（HKD）</div>
        <input class="profit-m-inp" type="number" value="${r.actualPostage!=null?r.actualPostage:''}" placeholder="輸入金額" style="width:100%;margin-top:4px;"
          onblur="saveActualPostage('${esc(String(r.analysisRow))}',this.value)">
      </div>
    </div>`;
}

async function saveActualPostage(analysisRow, value){
  if(value===''||analysisRow==='')return;
  try{
    await postMain({action:'saveActualPostage',password:pw,analysisRow,value});
  }catch(e){alert('儲存失敗：'+e.message);}
}

async function clearIColor(group, analysisRow){
  try{
    const d=await postMain({action:'clearIColumnColor',password:pw,analysisRow});
    if(d.error)throw new Error(d.error);
    // 即時更新本地資料，唔需要重新載入
    const r=profitAllRows.find(row=>row.group===group);
    if(r){r.settled=d.settled;}
    renderProfitGroup(curProfitGroup);
  }catch(e){alert('失敗：'+e.message);}
}

// ════════ ID SEARCH ════════
function loadIdList(){
  post({action:'getCustomerIds',password:pw}).then(d=>{document.getElementById('idList').innerHTML=(d.ids||[]).map(id=>`<option value="${esc(id)}">`).join('');}).catch(()=>{});
}
document.addEventListener('DOMContentLoaded',()=>{
  const ci=document.getElementById('cidInp');
  if(ci)ci.addEventListener('keydown',e=>{if(e.key==='Enter')searchUser();});
});

function searchUser(){
  const id=(document.getElementById('cidInp').value||'').trim();if(!id)return;
  document.getElementById('sStatus').textContent='⏳ 查詢中…';
  document.getElementById('resultCard').style.display='none';
  // Search from Public Sheet User name sheet (B=username, C=url)
  postMain({action:'findUserByIdFromPublic',password:pw,custId:id}).then(d=>{
    document.getElementById('sStatus').textContent='';
    if(d.error){alert('找不到此 ID，請檢查拼字');return;}
    document.getElementById('rUsername').textContent=d.username||'';
    document.getElementById('rUrl').value=d.url||'';
    document.getElementById('resultCard').style.display='block';
  }).catch(()=>document.getElementById('sStatus').textContent='❌ 查詢失敗');
}

function copyUrl(){
  const url=document.getElementById('rUrl').value;
  navigator.clipboard.writeText(url).then(()=>{const b=event.target;const o=b.textContent;b.textContent='✅ 已複製！';setTimeout(()=>b.textContent=o,2000);}).catch(()=>{
    const t=document.getElementById('rUrl');t.select();document.execCommand('copy');
    const b=event.target;const o=b.textContent;b.textContent='✅ 已複製！';setTimeout(()=>b.textContent=o,2000);
  });
}

// ════════ ADD ITEM MODAL ════════
function openAddModal(){document.getElementById('addModal').classList.add('open');}
function closeAddModal(){document.getElementById('addModal').classList.remove('open');}
async function submitNewItem(){
  const b=document.getElementById('addSubmitBtn');
  const p={action:'addNewItem',password:pw,
    date:document.getElementById('addDate').value.replace(/-/g,'/'),
    shop:document.getElementById('addShop').value,
    link:document.getElementById('addLink').value.trim(),
    item:document.getElementById('addItem').value.trim(),
    jpy:document.getElementById('addJpy').value,
    pos:document.getElementById('addPos').value.trim(),
    id:document.getElementById('addCustId').value.trim()};
  if(!p.item||!p.shop||!p.pos){alert('請填寫完整資訊');return;}
  b.disabled=true;b.textContent='處理中…';
  try{const d=await post(p);if(d.success){alert('成功！');closeAddModal();callAdmin();}else alert('出錯：'+d.error);}
  catch{alert('失敗');}finally{b.disabled=false;b.textContent='確定加入';}
}

// ════════ UTILS ════════
function post(obj){return fetch(API,{method:'POST',body:new URLSearchParams(obj)}).then(r=>r.json());}
function postMain(obj){return fetch(MAIN_API,{method:'POST',body:new URLSearchParams(obj)}).then(r=>r.json());}
function gn(s){const m=String(s||'').match(/\d+/);return m?parseInt(m[0]):-1;}
async function compUp(file){return new Promise((res,rej)=>{const img=new Image(),rd=new FileReader();rd.onload=e=>img.src=e.target.result;img.onload=()=>{const c=document.createElement('canvas'),max=1000;let w=img.width,h=img.height;if(w>h&&w>max){h*=max/w;w=max;}else if(h>max){w*=max/h;h=max;}c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);c.toBlob(blob=>{const fd=new FormData();fd.append('file',blob);fd.append('upload_preset',UPLOAD_PRESET);fd.append('folder',CLOUD_FOLDER);fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,{method:'POST',body:fd}).then(r=>r.json()).then(d=>res(d.secure_url)).catch(rej);},'image/jpeg',0.7);};rd.readAsDataURL(file);});}
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function escAttr(s){return esc(s).replace(/\n/g,' ');}
</script>
